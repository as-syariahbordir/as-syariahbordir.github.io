---
layout: product
---
  {% for post in site.posts %}
<article class="shop">
<ion-router-link href="{{ site.baseurl }}{{ post.url }}">
    <ion-card class="post-product">
            <img src="{{ site.baseurl }}{{ post.img }}">
      <ion-card-header class="post-header">
        <ion-card-title class="post-title">{{ post.title }}</ion-card-title>
        <ion-card-subtitle color="danger">Rp. {{ post.price }}
<a  class="fav_btn" onclick="favOptions()" >
    <span id="like-{{ post.noID }}" class="like-btn">
    <ion-icon name="heart" slot="end"></ion-icon>
    </span>
</a>
</ion-card-subtitle>

      </ion-card-header>
      <ion-card-content class="post-entry">
<ion-note>{{ post.riv }} terjual</ion-note>
<ion-note><ion-icon name="star" class="star"></ion-icon> {{post.rating}}</ion-note>
      </ion-card-content>
    </ion-card>
</ion-router-link>
</article>
  {% endfor %}
