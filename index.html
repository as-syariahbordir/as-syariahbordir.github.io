---
layout: default
title: Toko As-Syariah
---

<ion-content fullscreen="true">
  <div class="product-grid" id="productGrid">
    {% for item in site.products %}
      <div class="product-card" data-product="{{ item | jsonify | escape }}">
        <img class="product-image" src="{{ item.image }}" alt="{{ item.title }}" loading="lazy" />
        <div class="product-title">{{ item.title }}</div>
        <div class="product-price">
          {% if item.price %}
            <span style="text-decoration: line-through; color: #999; margin-right: 8px;">
              Rp {{ item.price }}
            </span>
          {% endif %}
          <span style="font-weight: bold; color: #e74c3c;">
            Rp {{ item.discount }}
          </span>
        </div>
        <div class="product-stock {% if item.stok == 'Stok Habis' %}out-of-stock{% else %}in-stock{% endif %}">
          {% if item.stok == 'Stok Habis' %}Stok Habis{% else %}Tersedia{% endif %}
        </div>
        <div style="padding: 0 12px 8px; font-size: 11px; color: #3880ff;">
        </div>
      </div>
    {% endfor %}
  </div>
</ion-content>
