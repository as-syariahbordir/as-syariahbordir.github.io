<script>
  let currentPopover = null;

  const buttons = document.querySelectorAll('privacy');
  for (var i = 0; i < buttons.length; i++) {
    buttons[i].addEventListener('click', handleButtonClick);
  }

  async function handleButtonClick(ev) {
    popover = await popoverController.create({
      component: 'popover-example-page',
      event: ev,
      translucent: true,
    });
    currentPopover = popover;
    return popover.present();
  }

  function dismissPopover() {
    if (currentPopover) {
      currentPopover.dismiss().then(() => {
        currentPopover = null;
      });
    }
  }

  customElements.define(
    'popover-example-page',
    class ModalContent extends HTMLElement {
      connectedCallback() {
        this.innerHTML = `
      <ion-list>
        <ion-item button >Blogs</ion-item>
        <ion-item button onclick="myPayment()">Pembayaran</ion-item>
        <ion-item lines="none" detail="false" button href="/privacy-policy">Privacy Policy</ion-item>
      </ion-list>
    `;
      }
    }
  );
</script>
