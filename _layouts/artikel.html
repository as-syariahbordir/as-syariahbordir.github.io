---
layout: default
---
<style>
    .blog { padding:0px;}
    .wrapper-footer { display:none!important; }
    .posts {padding-top:70px;}
</style>
<ion-header style="position:fixed;">
    <ion-toolbar color="danger">
        <ion-buttons slot="start" onclick="javascript:history.back()/artikel">
          <ion-button onclick="handleButtonClick()"><ion-icon name="chevron-back-outline"></ion-icon><ion-label color="light">Back</ion-label>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
  </ion-header>
<div class="container posts">
  <center style="border-bottom: 2px solid #ddd;width: inherit;"><h2>{{ page.title }}</h2></center>
{{ content }}
</div>
