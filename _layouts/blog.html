---
layout: default
---
<style>
    .blog { padding:0px;}
</style>
<ion-header>
    <ion-toolbar color="danger">
    {% if page.layout == "default" %}
        <ion-buttons slot="start" onclick="javascript:history.back()">
          <ion-button><ion-icon name="chevron-back-outline"></ion-icon><ion-label color="light">Back</ion-label>
          </ion-button>
        </ion-buttons>
    {% endif %}
    {% if page.layout == "artikel" %}
        <ion-buttons slot="start" onclick="javascript:history.back()/artikel">
          <ion-button><ion-icon name="chevron-back-outline"></ion-icon><ion-label color="light">Back</ion-label>
          </ion-button>
        </ion-buttons>
    {% endif %}
      </ion-toolbar>
  </ion-header>

<article class="page-pay">
  <center><h1>{{ page.title }}</h1></center>
{% for artikel in site.data.artikel %}
        <ion-item href="{{ artikel.url }}">
          <ion-thumbnail slot="start">
            <img src="{{ artikel.img }}">
          </ion-thumbnail>
          <ion-label>
            <h3>{{ artikel.judul }}</h3>
            <p>{{ artikel.deskrip }}</p>
          </ion-label>
        </ion-item>
{% endfor %}
</article>
