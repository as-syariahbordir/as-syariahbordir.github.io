
  <script>
    // Konfigurasi SimpleCart
    simpleCart({
      cartColumns: [
        { attr: "thumb", label: "", view: "thumb" },
        { attr: "name", label: "Produk", view: "link" },
        { attr: "price", label: "Harga", view: "currency" },
        { attr: "warna", label: "Warna", view: "text" },
        { attr: "ukuran", label: "Model", view: "text" },
        { view: "decrement", label: false },
        { attr: "quantity", label: 'Qty', view: "qty" },
        { view: "increment", label: false },
        { view: "remove", text: "Hapus", label: false }
      ],
      currency: "IDR",
    });

    // AI Chat State
    let currentProduct = null;
    let chatSessionId = Date.now().toString();
    const AI_API_URL = 'https://assya-ai.sendaljepit.workers.dev/api/chat';
    
    // Flag untuk tracking Ionic readiness
    let ionicReady = false;

    // Helper functions
    function parsePrice(p) {
      if (!p) return 0;
      let val = p;
      if (typeof val === 'string') {
        val = val.replace(/\./g, '').replace(/\D/g, '');
        val = parseInt(val, 10);
      }
      if (typeof val === 'number' && !isNaN(val)) {
        // AI often reads "15.600" as 15.6 (decimal).
        // Since all products are > Rp10.000, we multiply if it's too small.
        if (val > 0 && val < 1000) return Math.round(val * 1000);
        return Math.round(val);
      }
      return 0;
    }

    function formatPrice(price) {
      if (typeof price === 'string') return price;
      return price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }
    
    // Wait for Ionic to be fully ready
    async function waitForIonic() {
      if (ionicReady) return true;
      
      try {
        if (typeof customElements !== 'undefined') {
          await customElements.whenDefined('ion-modal');
          await customElements.whenDefined('ion-content');
          await customElements.whenDefined('ion-header');
          await customElements.whenDefined('ion-footer');
          ionicReady = true;
          console.log('Ionic components ready');
          return true;
        }
      } catch (err) {
        console.error('Error waiting for Ionic:', err);
        return false;
      }
      return false;
    }

    // Open chat for specific product
    async function openProductChat(product) {
      console.log('Membuka Chat untuk:', product.title);
      currentProduct = product;
      chatSessionId = Date.now().toString();

      const modal = document.getElementById('chat-modal');
      const titleSpan = document.getElementById('chat-title');
      const messages = document.getElementById('chat-messages');

      if (!modal) {
        console.error('EROR: Modal chat-modal tidak ditemukan di DOM!');
        return;
      }

      if (titleSpan) titleSpan.textContent = product.title;
      if (messages) messages.innerHTML = '';

      const colors = product.styles?.map(s => s.name).join(', ') || 'berbagai pilihan';

      try {
        // Pastikan Ionic sudah siap
        await waitForIonic();
        
        if (typeof modal.present !== 'function') {
          console.error('EROR: modal.present() bukan fungsi. Ionic mungkin tidak terload dengan benar.');
          return;
        }

        await modal.present();
        console.log('Modal berhasil dibuka (present)');

        // Buat chat lebih natural dengan delay dan typing indicator
        showTyping();
        setTimeout(() => {
          hideTyping();
          addMessage('ai', `👋 **Hai! Saya Assya, AI Assistant untuk ${product.title}**\n\nProduk ini tersedia dalam warna: *${colors}*.\n\nApa yang bisa saya bantu? 😊\n\n*Contoh chat:*\n• "Ada warna apa aja?"\n• "Aku mau beli"\n• "Detail produk"`);

          const input = document.getElementById('chat-input');
          if (input) {
            input.setFocus();
          }
          scrollToBottom();
        }, 1000);
      } catch (err) {
        console.error('Eror saat memanggil modal.present():', err);
        alert('Terjadi kesalahan saat membuka chat. Silakan refresh halaman.');
      }
    }

    function addMessage(sender, text) {
      const messages = document.getElementById('chat-messages');
      if (!messages) return;

      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${sender}-message`;

      let htmlText = text
        .replace(/(\*\*|__)(.*?)\1/g, '<strong>$2</strong>')
        .replace(/(\*|_)(.*?)\1/g, '<em>$2</em>')
        .replace(/\n/g, '<br>')
        .replace(/`(.*?)`/g, '<code>$1</code>')
        .replace(/•/g, '<span style="display:inline-block;width:20px;color:#3880ff;">•</span>');

      messageDiv.innerHTML = htmlText;
      messages.appendChild(messageDiv);
      scrollToBottom();
    }

    function scrollToBottom() {
      const content = document.querySelector('#chat-modal ion-content');
      if (content && typeof content.scrollToBottom === 'function') {
        setTimeout(() => {
          content.scrollToBottom(500); // 500ms adalah durasi animasi scroll-nya
        }, 100);
      }
    }

    function showTyping() {
      const messages = document.getElementById('chat-messages');
      if (!messages) return;

      const typingDiv = document.createElement('div');
      typingDiv.className = 'typing-indicator';
      typingDiv.id = 'typing-indicator';
      typingDiv.innerHTML = `
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      `;
      messages.appendChild(typingDiv);
      scrollToBottom();
    }

    function hideTyping() {
      const typing = document.getElementById('typing-indicator');
      if (typing) typing.remove();
    }

    async function sendMessage() {
      const input = document.getElementById('chat-input');
      if (!input) return;

      const message = input.value.trim();
      if (!message) return;

      input.value = '';

      addMessage('user', message);
      showTyping();

      try {
        const response = await fetch(AI_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: message,
            productId: currentProduct?.id,
            sessionId: chatSessionId
          })
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const aiData = await response.json();
        hideTyping();

        if (aiData.sessionId) {
          chatSessionId = aiData.sessionId;
        }

        if (aiData.response) {
          // Perbaiki format harga yang "pendek" di teks AI (misal Rp15.6 atau Rp15 -> Rp15.600)
          let processedResponse = aiData.response.replace(/Rp\s?(\d+(?:[.,]\d+)?)/gi, (match, p1) => {
            let num = parseFloat(p1.replace(',', '.'));
            if (num > 0 && num < 1000) {
              return angkaToRp(num * 1000);
            }
            return match;
          });
          addMessage('ai', processedResponse);
        }

        if (aiData.action?.type === 'addToCart' && aiData.action.data) {
          handleAddToCart(aiData.action.data);
        }

      } catch (error) {
          showTyping();
          setTimeout(() => {
            hideTyping();
        console.error('Chat error:', error);
        addMessage('ai', "Maaf kak, Assya sedang istirahat sejenak 😵‍💫 Coba lagi ya atau langsung pesan lewat tombol WhatsApp!");
          }, 1000);
      }
    }

    function handleAddToCart(itemData) {
      try {
        const price = parsePrice(itemData.price);
        const quantity = itemData.quantity || 1;
        const warna = itemData.warna || 'pilihan';
        const ukuran = itemData.ukuran || 'regular';
        const productName = itemData.name || currentProduct?.title;

        simpleCart.add({
          name: productName,
          price: price,
          quantity: quantity,
          warna: warna,
          ukuran: ukuran,
          link: currentProduct?.url || '#',
          thumb: currentProduct?.image || '',
          berat: 100
        });

        updateCartCount();
        updateCartModal();

      } catch (error) {
          showTyping();
          setTimeout(() => {
            hideTyping();
        console.error('Add to cart error:', error);
            addMessage('ai', '😅 Ups, gagal nambahin ke keranjang. Coba lagi ya!');
          }, 1000);
        }
      }

    function updateCartCount() {
      try {
        const count = simpleCart.quantity();
        const cartCount = document.getElementById('cart-count');
        if (cartCount) {
          cartCount.textContent = count;
        }
      } catch (error) {
        console.error('Update cart count error:', error);
      }
    }

    function updateCartModal() {
      const items = simpleCart.items();
      const cartFooter = document.getElementById('cart-footer');

      if (items.length === 0) {
        if (cartFooter) cartFooter.style.display = 'none';
      } else {
        if (cartFooter) cartFooter.style.display = 'block';
      }
    }

    function closeChatModal() {
      const modal = document.getElementById('chat-modal');
      if (modal) {
        modal.dismiss();
        currentProduct = null;
        chatSessionId = Date.now().toString();
      }
    }

    function closeCartModal() {
      const modal = document.getElementById('cart-modal');
      if (modal) modal.dismiss();
    }

    function closeCheckoutModal() {
      const modal = document.getElementById('checkout-modal');
      if (modal) modal.dismiss();
    }

    async function checkout() {
      if (simpleCart.quantity() === 0) {
        alert('Keranjang masih kosong nih!');
        return;
      }
      
      const cartModal = document.getElementById('cart-modal');
      if (cartModal) await cartModal.dismiss();

      const checkoutModal = document.getElementById('checkout-modal');
      if (checkoutModal) {
        if (typeof checkoutModal.present !== 'function') await customElements.whenDefined('ion-modal');
        await checkoutModal.present();
      }
    }

    window.WhatsAppOrder = function() {
      // Logic has moved to WhatsApp() in formOrder.js
      WhatsApp();
    };

    document.addEventListener('DOMContentLoaded', function() {
      if (typeof simpleCart !== 'undefined') {
        simpleCart.bind('update', function() {
          updateCartCount();
          updateCartModal();
        });
      }

      const cartBtn = document.getElementById('cart-button');
      if (cartBtn) {
        cartBtn.addEventListener('click', async function() {
          const modal = document.getElementById('cart-modal');
          if (modal) {
            updateCartModal();
            if (typeof modal.present !== 'function') await customElements.whenDefined('ion-modal');
            await modal.present();
          }
        });
      }

      const productGrid = document.getElementById('productGrid');
      if (productGrid) {
        productGrid.addEventListener('click', function(e) {
          const card = e.target.closest('.product-card');
          if (card && card.dataset.product) {
            const product = JSON.parse(card.dataset.product);
            openProductChat(product);
          }
        });
      }

      setTimeout(() => {
        const messages = document.getElementById('chat-messages');
        if (messages && messages.children.length === 0) {
          showTyping();
          setTimeout(() => {
            hideTyping();
            addMessage('ai', '👋 **Selamat datang di As-Syari\'ah Bordir AI Shopping Assistant!**\n\nKlik produk untuk mulai ngobrol dengan AI!');
          }, 800);
        }
      }, 1000);
    });

    // Handle viewport changes for keyboard
    if ('visualViewport' in window) {
      window.visualViewport.addEventListener('resize', () => scrollToBottom());
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();
  </script>
