
  <script>
   // Konfigurasi SimpleCart
    simpleCart({
      cartColumns: [
        { attr: "thumb", label: "", view: "thumb" },
        { attr: "name", label: "Produk", view: "link" },
        { attr: "price", label: "Harga", view: "currency" },
        { attr: "warna", label: "Warna", view: "text" },
        { attr: "ukuran", label: "Model", view: "text" },
        { view: "decrement", label: false },
        { attr: "quantity", label: 'Qty', view: "qty" },
        { view: "increment", label: false },
        { view: "remove", text: "Hapus", label: false }
      ],
      currency: "IDR",
    });

    // AI Chat State
    let currentProduct = null;
    let chatSessionId = Date.now().toString();
    const AI_API_URL = 'https://assya-ai.sendaljepit.workers.dev/api/chat';

    // Flag untuk tracking Ionic readiness
    let ionicReady = false;

    // Initialize Ionic readiness check immediately
    (async function initIonic() {
      //console.log('Initializing Ionic...');
      try {
        if (typeof customElements !== 'undefined') {
          await Promise.all([
            customElements.whenDefined('ion-modal'),
            customElements.whenDefined('ion-content'),
            customElements.whenDefined('ion-header'),
            customElements.whenDefined('ion-footer'),
            customElements.whenDefined('ion-button'),
            customElements.whenDefined('ion-icon')
          ]);
          ionicReady = true;
          //console.log('✅ Ionic fully initialized!');
        } else {
          //console.error('❌ customElements not available');
        }
      } catch (err) {
        //console.error('❌ Ionic initialization error:', err);
      }
    })();

    // Helper functions
    function parsePrice(p) {
      if (!p) return 0;
      let val = p;
      if (typeof val === 'string') {
        val = val.replace(/\./g, '').replace(/\D/g, '');
        val = parseInt(val, 10);
      }
      if (typeof val === 'number' && !isNaN(val)) {
        // AI often reads "15.600" as 15.6 (decimal).
        // Since all products are > Rp10.000, we multiply if it's too small.
        if (val > 0 && val < 1000) return Math.round(val * 1000);
        return Math.round(val);
      }
      return 0;
    }

    function formatPrice(price) {
      if (typeof price === 'string') return price;
      return price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    }

    // Wait for Ionic to be fully ready
    async function waitForIonic() {
      if (ionicReady) {
        //console.log('Ionic already ready');
        return true;
      }

      //console.log('Waiting for Ionic...');
      try {
        if (typeof customElements !== 'undefined') {
          await customElements.whenDefined('ion-modal');
          ionicReady = true;
          //console.log('✅ Ionic ready!');
          return true;
        }
      } catch (err) {
        console.error('Error waiting for Ionic:', err);
        return false;
      }
      return false;
    }

    // Open chat for specific product
    async function openProductChat(product) {
      //console.log('🔵 [openProductChat] Called with product:', product?.title);
      //console.log('🔵 [openProductChat] ionicReady:', ionicReady);

      currentProduct = product;
      chatSessionId = Date.now().toString();

      const modal = document.getElementById('chat-modal');
      //console.log('🔵 [openProductChat] Modal element:', modal);

      const titleSpan = document.getElementById('chat-title');
      const messages = document.getElementById('chat-messages');

      if (!modal) {
        console.error('❌ [openProductChat] Modal chat-modal tidak ditemukan di DOM!');
        return;
      }

      if (titleSpan) titleSpan.textContent = product.title;
      if (messages) messages.innerHTML = '';

      const colors = product.styles?.map(s => s.name).join(', ') || 'berbagai pilihan';

      try {
        // Pastikan Ionic sudah siap
        //console.log('🔵 [openProductChat] Calling waitForIonic()...');
        const isIonicReady = await waitForIonic();
        //console.log('🔵 [openProductChat] Ionic ready result:', isIonicReady);

        if (typeof modal.present !== 'function') {
          console.error('❌ [openProductChat] modal.present() bukan fungsi. Ionic mungkin tidak terload dengan benar.');
          //console.log('🔵 [openProductChat] modal object:', modal);
          return;
        }

        //console.log('🔵 [openProductChat] Calling modal.present()...');
        await modal.present();
        //console.log('✅ [openProductChat] Modal berhasil dibuka (present)');

        // Buat chat lebih natural dengan delay dan typing indicator
        showTyping();
        setTimeout(() => {
          hideTyping();
          addMessage('ai', `👋 **Hai! Saya Assya, AI Assistant untuk ${product.title}**\n\nProduk ini tersedia dalam warna: *${colors}*.\n\nApa yang bisa saya bantu? 😊\n\n*Contoh chat:*\n• "Aku mau beli"\n• "Detail produk"\n• "Lihat Semua Foto"`);

          const input = document.getElementById('chat-input');
          if (input) {
            input.setFocus();
          }
          scrollToBottom();
        }, 1000);
      } catch (err) {
        console.error('❌ [openProductChat] Eror saat memanggil modal.present():', err);
        alert('Terjadi kesalahan saat membuka chat. Silakan refresh halaman.');
      }
    }

    function addMessage(sender, text) {
      const messages = document.getElementById('chat-messages');
      if (!messages) return;

      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${sender}-message`;

      let htmlText = text
        .replace(/(\*\*|__)(.*?)\1/g, '<strong>$2</strong>')
        .replace(/(\*|_)(.*?)\1/g, '<em>$2</em>')
        .replace(/\n/g, '<br>')
        .replace(/`(.*?)`/g, '<code>$1</code>')
        .replace(/•/g, '<span style="display:inline-block;width:20px;color:#3880ff;">•</span>');

      messageDiv.innerHTML = htmlText;
      messages.appendChild(messageDiv);
      scrollToBottom();
    }

    // Function to display product images
    function showProductImages(imagesData) {
      const messages = document.getElementById('chat-messages');
      if (!messages || !imagesData || !imagesData.images) return;

      const imageDiv = document.createElement('div');
      imageDiv.className = 'message ai-message product-images-container';

      let imagesHtml = '<div class="product-images-grid">';

      imagesData.images.forEach(img => {
        imagesHtml += `
          <div class="product-image-card" style="border-color: ${img.color || '#ccc'};">
            <img src="${img.image_path}" alt="${img.name}" loading="lazy" />
            <div class="product-image-label" style="background-color: ${img.color || '#ccc'};">
              <span style="color: ${getContrastColor(img.color)};">${img.name}</span>
            </div>
          </div>
        `;
      });

      imagesHtml += '</div>';
      imageDiv.innerHTML = imagesHtml;
      messages.appendChild(imageDiv);
      scrollToBottom();
    }

    // Helper function to determine text color based on background
    function getContrastColor(hexcolor) {
      if (!hexcolor) return '#000';
      // Convert hex to RGB
      const r = parseInt(hexcolor.substr(1, 2), 16);
      const g = parseInt(hexcolor.substr(3, 2), 16);
      const b = parseInt(hexcolor.substr(5, 2), 16);
      // Calculate luminance
      const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
      return (yiq >= 128) ? '#000' : '#fff';
    }

    function scrollToBottom() {
      const content = document.querySelector('#chat-modal ion-content');
      if (content && typeof content.scrollToBottom === 'function') {
        setTimeout(() => {
          content.scrollToBottom(500); // 500ms adalah durasi animasi scroll-nya
        }, 100);
      }
    }

    function showTyping() {
      const messages = document.getElementById('chat-messages');
      if (!messages) return;

      const typingDiv = document.createElement('div');
      typingDiv.className = 'typing-indicator';
      typingDiv.id = 'typing-indicator';
      typingDiv.innerHTML = `
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      `;
      messages.appendChild(typingDiv);
      scrollToBottom();
    }

    function hideTyping() {
      const typing = document.getElementById('typing-indicator');
      if (typing) typing.remove();
    }

    // Fungsi helper untuk membuka modal Keranjang Ionic
    async function openCartModalDirectly() {
      const chatModal = document.getElementById('chat-modal');
      // Tutup modal chat terlebih dahulu
      if (chatModal) {
        await chatModal.dismiss();
      }

      // Buka modal keranjang
      const cartModal = document.getElementById('cart-modal');
      if (cartModal) {
        updateCartModal();
        if (typeof cartModal.present !== 'function') {
          await customElements.whenDefined('ion-modal');
        }
        await cartModal.present();
      }
    }

    function handleAddMultipleToCart(itemsArray) {
      try {
        itemsArray.forEach(item => {
          const price = parsePrice(item.price);
          const quantity = item.quantity || 1;
          const warna = item.warna || 'pilihan';
          const ukuran = item.ukuran || 'regular';
          const productName = item.name || currentProduct?.title;

          simpleCart.add({
            name: productName,
            price: price,
            quantity: quantity,
            warna: warna,
            ukuran: ukuran,
            link: item.link || currentProduct?.url || '#',
            thumb: item.thumb || currentProduct?.image || '',
            berat: item.berat || 100
          });
        });

        updateCartCount();
        updateCartModal();

        // Otomatis arahkan dan buka modal keranjang setelah barang ditambahkan
        setTimeout(() => {
          openCartModalDirectly();
        }, 3000); // Memberikan jeda 3 detik agar user sempat membaca info sukses di chat

      } catch (error) {
        console.error('Add multiple to cart error:', error);
        addMessage('ai', '😅 Ups, gagal menambahkan beberapa item. Coba lagi ya!');
      }
    }

    async function sendMessage() {
      const input = document.getElementById('chat-input');
      if (!input) return;

      const message = input.value.trim();
      if (!message) return;

      input.value = '';

      addMessage('user', message);
      showTyping();

      try {
        const response = await fetch(AI_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: message,
            productId: currentProduct?.id,
            sessionId: chatSessionId
          })
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const aiData = await response.json();
        hideTyping();

        if (aiData.sessionId) {
          chatSessionId = aiData.sessionId;
        }

        if (aiData.response) {
          // Perbaiki format harga yang "pendek" di teks AI (misal Rp15.6 atau Rp15 -> Rp15.600)
          let processedResponse = aiData.response.replace(/Rp\s?(\d+(?:[.,]\d+)?)/gi, (match, p1) => {
            let num = parseFloat(p1.replace(',', '.'));
            if (num > 0 && num < 1000) {
              return angkaToRp(num * 1000);
            }
            return match;
          });
          addMessage('ai', processedResponse);
        }

        if (aiData.action?.type === 'addToCart' && aiData.action.data) {
          handleAddToCart(aiData.action.data);
        }

        if (aiData.action?.type === 'addMultipleToCart' && Array.isArray(aiData.action.data)) {
          handleAddMultipleToCart(aiData.action.data);
        }

        if (aiData.action?.type === 'showImages' && aiData.action.data) {
          showProductImages(aiData.action.data);
        }

        // Handle aksi baru: openCart
        if (aiData.action?.type === 'openCart') {
          setTimeout(() => {
            openCartModalDirectly();
          }, 3000); // Jeda 3 detik agar user sempat membaca chat respons AI terlebih dahulu
        }

      } catch (error) {
          setTimeout(() => {
          showTyping();
          setTimeout(() => {
            hideTyping();
        console.error('Chat error:', error);
        addMessage('ai', "Maaf kak, Assya sedang istirahat sejenak 😵‍💫 Coba lagi ya atau langsung pesan lewat tombol WhatsApp!");
          }, 800);
          }, 1500);
      }
    }

    function handleAddToCart(itemData) {
      try {
        const price = parsePrice(itemData.price);
        const quantity = itemData.quantity || 1;
        const warna = itemData.warna || 'pilihan';
        const ukuran = itemData.ukuran || 'regular';
        const productName = itemData.name || currentProduct?.title;

        simpleCart.add({
          name: productName,
          price: price,
          quantity: quantity,
          warna: warna,
          ukuran: ukuran,
          link: currentProduct?.url || '#',
          thumb: currentProduct?.image || '',
          berat: 100
        });

        updateCartCount();
        updateCartModal();

      } catch (error) {
          setTimeout(() => {
          showTyping();
          setTimeout(() => {
            hideTyping();
        console.error('Add to cart error:', error);
            addMessage('ai', '😅 Ups, gagal nambahin ke keranjang. Coba lagi ya!');
          }, 800);
        }, 1500);
        }
      }

    function updateCartCount() {
      try {
        const count = simpleCart.quantity();
        const cartCount = document.getElementById('cart-count');
        if (cartCount) {
          cartCount.textContent = count;
        }
      } catch (error) {
        console.error('Update cart count error:', error);
      }
    }

    function updateCartModal() {
      const items = simpleCart.items();
      const cartFooter = document.getElementById('cart-footer');

      if (items.length === 0) {
        if (cartFooter) cartFooter.style.display = 'none';
      } else {
        if (cartFooter) cartFooter.style.display = 'block';
      }
    }

    function closeChatModal() {
      const modal = document.getElementById('chat-modal');
      if (modal) {
        modal.dismiss();
        currentProduct = null;
        chatSessionId = Date.now().toString();
      }
    }

    function closeCartModal() {
      const modal = document.getElementById('cart-modal');
      if (modal) modal.dismiss();
    }

    function closeCheckoutModal() {
      const modal = document.getElementById('checkout-modal');
      if (modal) modal.dismiss();
    }

    async function checkout() {
      if (simpleCart.quantity() === 0) {
        alert('Keranjang masih kosong nih!');
        return;
      }

      const cartModal = document.getElementById('cart-modal');
      if (cartModal) await cartModal.dismiss();

      const checkoutModal = document.getElementById('checkout-modal');
      if (checkoutModal) {
        if (typeof checkoutModal.present !== 'function') await customElements.whenDefined('ion-modal');
        await checkoutModal.present();
      }
    }

    window.WhatsAppOrder = function() {
      // Logic has moved to WhatsApp() in formOrder.js
      WhatsApp();
    };

    // Expose modal functions to window for onclick handlers
    window.openProductChat = openProductChat;
    window.closeChatModal = closeChatModal;
    window.closeCartModal = closeCartModal;
    window.closeCheckoutModal = closeCheckoutModal;
    window.checkout = checkout;
    window.sendMessage = sendMessage;

    document.addEventListener('DOMContentLoaded', function() {
      if (typeof simpleCart !== 'undefined') {
        simpleCart.bind('update', function() {
          updateCartCount();
          updateCartModal();
        });
      }

      const cartBtn = document.getElementById('cart-button');
      if (cartBtn) {
        cartBtn.addEventListener('click', async function() {
          const modal = document.getElementById('cart-modal');
          if (modal) {
            updateCartModal();
            if (typeof modal.present !== 'function') await customElements.whenDefined('ion-modal');
            await modal.present();
          }
        });
      }

      const collection = document.getElementById('collection');
      //console.log('Product Grid found:', !!collection);
      if (collection) {
        collection.addEventListener('click', function(e) {
          //console.log('Grid clicked!', e.target);
          const card = e.target.closest('.product-card');
          //console.log('Card found:', !!card);
          if (card && card.dataset.product) {
            try {
              const product = JSON.parse(card.dataset.product);
              //console.log('Product data:', product);
              openProductChat(product);
            } catch (err) {
              console.error('Error parsing product data:', err);
            }
          }
        });
      }

      setTimeout(() => {
        const messages = document.getElementById('chat-messages');
        if (messages && messages.children.length === 0) {
          showTyping();
          setTimeout(() => {
            hideTyping();
            addMessage('ai', '👋 **Selamat datang di As-Syari\'ah Bordir AI Shopping Assistant!**\n\nKlik produk untuk mulai ngobrol dengan AI!');
          }, 800);
        }
      }, 1500);
    });

    // Handle viewport changes for keyboard
    if ('visualViewport' in window) {
      window.visualViewport.addEventListener('resize', () => scrollToBottom());
    }

        const countdownBar = document.getElementById('countdownBar');

            countdownBar.style.strokeDasharray = circumference;
            countdownBar.style.strokeDashoffset = 0;
        }

        const timer = setInterval(() => {
            second--;

            const el = document.getElementById('aktivasi');
            if (el) el.textContent = second;

            if (countdownBar) {
                const offset = circumference - (second / totalDuration) * circumference;
                countdownBar.style.strokeDashoffset = offset;
            }

            if (second <= 0) {
                clearInterval(timer);
                window.location.href = 'https://daffadevhosting.github.io/blog/';

        }, 1000);
    }

    if (!isValid) {
        lockTemplate('Meta License Invalid');
        return;
    }

    // =====================================================
    // FOOTER SELECTION
    // =====================================================

    const footer =
        document.getElementById('footer') ||
        document.querySelector('footer') ||
        document.querySelector('.footer');

    if (!footer) {
        lockTemplate('Missing Footer Element');
        return;
    }

    // =====================================================
    // CREDIT ID GENERATOR
    // =====================================================

    const creditId = btoa(
        LICENSE_URL
            .split('')
            .reduce((sum, c) => sum + c.charCodeAt(0), 0)
            .toString()
    )
    .replace(/=/g, '')
    .substring(0, 10);

           target="_blank"

    credit.style.cssText = `
        margin-top: 12px !important;
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif !important;
        font-size: 11px !important;
        letter-spacing: 0.03em !important;
        opacity: .6 !important;
        display: block !important;
        visibility: visible !important;
        text-align: center !important;
        transition: opacity 0.3s !important;
    `;

    footer.appendChild(credit);

    // =====================================================
    // WATCHDOG (ULTRA SECURITY)
    // =====================================================

    setInterval(() => {
        const creditEl = document.getElementById('mia-license-credit');
        const footerEl =
            document.getElementById('footer') ||
            document.querySelector('footer') ||
            document.querySelector('.footer');

        // 1. Cek keberadaan elemen fisik
        if (!footerEl || !creditEl) {
            lockTemplate('Credit Dihapus dari DOM');
            return;
        }

        // 2. Cek apakah disembunyikan menggunakan CSS (display / opacity / visibility)
        const style = window.getComputedStyle(creditEl);
        const opacity = parseFloat(style.opacity);
        
        if (
            style.display === 'none' || 
            style.visibility === 'hidden' || 
            opacity < 0.1 ||
            creditEl.offsetHeight === 0
        ) {
            lockTemplate('CSS Hiding Detected');
            return;
        }

        // 3. Cek manipulasi isi Link / URL tujuan
        const linkEl = document.getElementById('mia-credit-link');
        if (!linkEl || linkEl.getAttribute('href') !== LICENSE_URL) {
            lockTemplate('License URL Tampered');
            return;
        }

        // 4. Cek manipulasi Teks Kredit (Mencegah nama diganti)
        if (!linkEl.textContent.includes('nDang')) {
            lockTemplate('Credit Text Renamed');
            return;
        }

    }, 3000);

    // =====================================================
    // IKLAN (AD MODAL - MODERN, MINIMALIST & MOBILE FRIENDLY)
    // =====================================================

    if (adImageUrl && adTargetUrl) {
        document.body.insertAdjacentHTML(
            'beforeend',
            `
            <style>
                @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

                .modal-overlay-ad {
                    position: fixed;
                    inset: 0;
                    background: rgba(9, 9, 11, 0.6);
                    backdrop-filter: blur(10px);
                    -webkit-backdrop-filter: blur(10px);
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    z-index: 9999999;
                    opacity: 0;
                    pointer-events: none;
                    transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1);
                    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
                    padding: 16px; /* Mencegah modal menyentuh tepi layar HP */
                    box-sizing: border-box;
                }

                .modal-overlay-ad.show {
                    opacity: 1;
                    pointer-events: auto;
                }

                .modal-content-ad {
                    width: 100%;
                    max-width: 380px;
                    background: #ffffff;
                    border: 1px solid rgba(0, 0, 0, 0.05);
                    border-radius: 24px;
                    padding: 32px 20px 24px;
                    position: relative;
                    text-align: center;
                    box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.25);
                    transform: scale(0.93) translateY(15px);
                    transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
                    box-sizing: border-box;
                }

                .modal-overlay-ad.show .modal-content-ad {
                    transform: scale(1) translateY(0);
                }

                /* Close button mobile friendly dengan area ketuk 44px */
                .close-ad-btn {
                    position: absolute;
                    top: 12px;
                    right: 12px;
                    border: none;
                    background: none;
                    width: 44px;
                    height: 44px;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    cursor: pointer;
                    color: #71717a;
                    transition: all 0.2s ease;
                    border-radius: 50%;
                    -webkit-tap-highlight-color: transparent;
                }

                .close-ad-btn-inner {
                    background: rgba(0, 0, 0, 0.04);
                    width: 30px;
                    height: 30px;
                    border-radius: 50%;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    transition: all 0.2s ease;
                }

                .close-ad-btn:hover .close-ad-btn-inner {
                    background: rgba(0, 0, 0, 0.08);
                    color: #18181b;
                    transform: rotate(90deg);
                }

                .close-ad-btn svg {
                    width: 12px;
                    height: 12px;
                }

                .modal-content-ad h3 {
                    margin: 8px 0 6px;
                    font-size: 11px;
                    font-weight: 600;
                    text-transform: uppercase;
                    letter-spacing: 0.1em;
                    color: #3b82f6;
                }

                .modal-content-ad h2 {
                    margin: 0 0 16px;
                    font-size: 18px;
                    font-weight: 700;
                    color: #18181b;
                    letter-spacing: -0.02em;
                    line-height: 1.3;
                }

                .ad-image-container {
                    position: relative;
                    width: 100%;
                    border-radius: 16px;
                    overflow: hidden;
                    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
                    margin-bottom: 20px;
                }

                .ad-image {
                    width: 100%;
                    height: auto;
                    display: block;
                    transition: transform 0.5s ease;
                }

                /* Efek hover dinonaktifkan di layar sentuh agar transisi mulus */
                @media (hover: hover) {
                    .ad-image-container:hover .ad-image {
                        transform: scale(1.03);
                    }
                }

                .ad-link-btn {
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    gap: 8px;
                    width: 100%;
                    padding: 12px 20px;
                    background: #18181b;
                    color: #ffffff;
                    text-decoration: none;
                    border-radius: 12px;
                    font-weight: 600;
                    font-size: 14px;
                    box-sizing: border-box;
                    transition: all 0.2s ease;
                    -webkit-tap-highlight-color: transparent;
                }

                .ad-link-btn:active {
                    background: #27272a;
                    transform: scale(0.98);
                }

                @media (hover: hover) {
                    .ad-link-btn:hover {
                        background: #27272a;
                        box-shadow: 0 8px 20px -6px rgba(24, 24, 27, 0.4);
                        transform: translateY(-1px);
                    }
                    .ad-link-btn:hover svg {
                        transform: translateX(3px);
                    }
                }

                .ad-link-btn svg {
                    width: 14px;
                    height: 14px;
                    transition: transform 0.2s ease;
                }

                /* Penyesuaian khusus HP Layar Kecil */
                @media (max-width: 360px) {
                    .modal-content-ad {
                        padding: 24px 16px 16px;
                    }
                    .modal-content-ad h2 {
                        font-size: 16px;
                    }
                }
            </style>

            <div class="modal-overlay-ad" id="adModal">
                <div class="modal-content-ad">
                    <button id="closeAdBtn" class="close-ad-btn" aria-label="Close ad">
                        <div class="close-ad-btn-inner">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </div>
                    </button>

                    <h3>Limited Offer</h3>
                    <h2>Promo Spesial Hari Ini!</h2>

                    <div class="ad-image-container">
                        <a href="${adTargetUrl}" target="_blank">
                            <img src="${adImageUrl}" class="ad-image" alt="Iklan Promo">
                        </a>
                    </div>

                    <a href="${adTargetUrl}" target="_blank" class="ad-link-btn">
                        Cek Sekarang
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
                        </svg>
                    </a>
                </div>
            </div>
            `
        );

        const modal = document.getElementById('adModal');
        const closeBtn = document.getElementById('closeAdBtn');

        setTimeout(() => {
            modal?.classList.add('show');
        }, 2000);

        closeBtn?.addEventListener('click', () => modal.classList.remove('show'));

        modal?.addEventListener('click', e => {
            if (e.target === modal) {
                modal.classList.remove('show');
            }
        });
    }
});
 </script>
  <script src="https://unpkg.com/lucide@latest"></script>
