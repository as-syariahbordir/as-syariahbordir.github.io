<!-- Parallax Embroidery Section -->
<section class="parallax-section" style="display: block !important; visibility: visible !important; opacity: 1 !important;">
  <div class="parallax-wrapper" style="display: block !important; visibility: visible !important;">
    <!-- Background Parallax Layers -->
    <div class="parallax-bg" data-speed="0.2">
      <div class="parallax-pattern pattern-1"></div>
      <div class="parallax-pattern pattern-2"></div>
      <div class="parallax-pattern pattern-3"></div>
    </div>
    
    <!-- Floating Embroidery Elements -->
    <div class="parallax-elements" data-speed="0.5">
      <div class="floating-element element-1">
        <div class="embroidery-icon">✦</div>
      </div>
      <div class="floating-element element-2">
        <div class="embroidery-icon">❖</div>
      </div>
      <div class="floating-element element-3">
        <div class="embroidery-icon">✿</div>
      </div>
      <div class="floating-element element-4">
        <div class="embroidery-icon">◈</div>
      </div>
      <div class="floating-element element-5">
        <div class="embroidery-icon">❀</div>
      </div>
    </div>
    
    <!-- Product Images Parallax -->
    <div class="parallax-products" data-speed="0.3">
      <div class="product-showcase" id="productShowcase">
        <!-- Product images will be loaded here dynamically -->
      </div>
    </div>
    
    <!-- Content Overlay -->
    <div class="parallax-content">
      <div class="content-inner">
        <h2 class="parallax-title">
          <span class="title-line">Seni Bordir</span>
          <span class="title-line">Nusantara</span>
        </h2>
        <p class="parallax-description">
          Setiap jahitan menceritakan kisah • Setiap warna menghadirkan keindahan
        </p>
        <div class="parallax-cta">
          <a href="#productGrid" class="cta-button">
            <span>Lihat Koleksi</span>
            <ion-icon name="arrow-down-outline"></ion-icon>

    <!-- Scroll Indicator -->

      <div class="mouse">
        <div class="wheel"></div>
      </div>
      <p>Scroll untuk menjelajah</p>
    </div>
  </div>
</section>

<style>
  /* Parallax Section Base */
  .parallax-section {
    position: relative;
    height: 100vh;
    min-height: 600px;
    overflow: hidden;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    margin: 0;
    padding: 0;
    width: 100%;
    display: block !important;
    visibility: visible !important;
    opacity: 1 !important;
  }
  
  /* Blur fade effect di bawah parallax */
  .parallax-section::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 130px;
    background: linear-gradient(
      to bottom,
      transparent 0%,
      rgba(26, 26, 46, 0.3) 30%,
      rgba(26, 26, 46, 0.6) 60%,
      rgba(26, 26, 46, 0.8) 80%,
      rgba(26, 26, 46, 0.95) 100%
    );
    pointer-events: none;
    z-index: 100;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  
  /* Extra glow effect untuk smooth transition */
  .parallax-section::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 150px;
    background: radial-gradient(
      ellipse at center bottom,
      rgba(255, 215, 0, 0.1) 0%,
      transparent 70%
    );
    pointer-events: none;
    z-index: 99;
    filter: blur(20px);
  }
  
  /* Override ion-content background */
  ion-content {
    --background: transparent !important;
    --padding-top: 0;
    --padding-bottom: 0;
  }
  
  /* Force ion-content to not overlap */
  ion-content::before {
    display: none;
  }
  
  .parallax-wrapper {
    position: relative;
    width: 100%;
    height: 100%;
    perspective: 1000px;
    display: block !important;
    visibility: visible !important;
  }
  
  /* Background Parallax */
  .parallax-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 120%;
    z-index: 1;
    transform-style: preserve-3d;
  }
  
  /* Decorative Patterns */
  .parallax-pattern {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
    animation: float 20s infinite ease-in-out;
  }
  
  .pattern-1 {
    width: 400px;
    height: 400px;
    top: 10%;
    left: -100px;
    animation-delay: 0s;
  }
  
  .pattern-2 {
    width: 300px;
    height: 300px;
    bottom: 20%;
    right: -50px;
    animation-delay: -7s;
  }
  
  .pattern-3 {
    width: 200px;
    height: 200px;
    top: 50%;
    left: 50%;
    animation-delay: -14s;
  }
  
  @keyframes float {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    25% { transform: translate(30px, -30px) rotate(90deg); }
    50% { transform: translate(-20px, 20px) rotate(180deg); }
    75% { transform: translate(20px, 30px) rotate(270deg); }
  }
  
  /* Floating Elements */
  .parallax-elements {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
  }
  
  .floating-element {
    position: absolute;
    animation: floatElement 15s infinite ease-in-out;
  }
  
  .embroidery-icon {
    font-size: 48px;
    color: rgba(255, 215, 0, 0.3);
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.3));
  }
  
  .element-1 { top: 15%; left: 10%; animation-delay: 0s; }
  .element-2 { top: 25%; right: 15%; animation-delay: -3s; }
  .element-3 { bottom: 30%; left: 20%; animation-delay: -6s; }
  .element-4 { bottom: 20%; right: 25%; animation-delay: -9s; }
  .element-5 { top: 50%; left: 50%; animation-delay: -12s; }
  
  @keyframes floatElement {
    0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
    25% { transform: translateY(-30px) rotate(90deg) scale(1.1); }
    50% { transform: translateY(-15px) rotate(180deg) scale(0.9); }
    75% { transform: translateY(-35px) rotate(270deg) scale(1.05); }
  }
  
  /* Product Showcase */
  .parallax-products {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .product-showcase {
    display: flex;
    gap: 20px;
    perspective: 1000px;
  }
  
  .showcase-item {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid rgba(255, 215, 0, 0.4);
    box-shadow: 0 10px 40px rgba(0,0,0,0.3),
                inset 0 0 30px rgba(255, 215, 0, 0.1);
    animation: showcaseFloat 8s infinite ease-in-out;
    transition: transform 0.3s, box-shadow 0.3s;
  }
  
  .showcase-item:hover {
    transform: scale(1.1) rotate(5deg);
    box-shadow: 0 15px 50px rgba(255, 215, 0, 0.3),
                inset 0 0 40px rgba(255, 215, 0, 0.2);
  }
  
  .showcase-item:nth-child(1) { animation-delay: 0s; }
  .showcase-item:nth-child(2) { animation-delay: -2s; }
  .showcase-item:nth-child(3) { animation-delay: -4s; }
  .showcase-item:nth-child(4) { animation-delay: -6s; }
  
  .showcase-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s;
  }
  
  .showcase-item:hover img {
    transform: scale(1.2);
  }
  
  @keyframes showcaseFloat {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(5deg); }
  }
  
  /* Content Overlay */
  .parallax-content {
    position: absolute;
    top: -15%;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.4) 100%);
  }
  
  .content-inner {
    padding: 40px;
    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.05);
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  
  .parallax-title {
    margin: 0 0 20px;
    font-size: 3.5rem;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 4px 20px rgba(0,0,0,0.5),
                 0 0 40px rgba(255, 215, 0, 0.3);
    line-height: 1.2;
  }
  
  .title-line {
    display: block;
    background: linear-gradient(135deg, #ffd700 0%, #ffed4e 50%, #ffd700 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s infinite linear;
  }
  
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  
  .parallax-description {
    font-size: 1.2rem;
    color: rgba(255, 255, 255, 0.8);
    margin: 0 0 30px;
    font-weight: 300;
    letter-spacing: 1px;
  }
  
  .parallax-cta {
    display: inline-block;
  }
  
  .cta-button {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 16px 32px;
    background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
    color: #1a1a2e;
    text-decoration: none;
    border-radius: 50px;
    font-weight: 700;
    font-size: 1rem;
    transition: all 0.3s;
    box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
  }
  
  .cta-button:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 40px rgba(255, 215, 0, 0.5);
  }
  
  .cta-button ion-icon {
    font-size: 20px;
    animation: bounce 2s infinite;
  }
  
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(5px); }
  }
  
  /* Scroll Indicator */
  .scroll-indicator {
    position: absolute;
    bottom: 118px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    color: rgba(255, 255, 255, 0.6);
    font-size: 0.9rem;
    animation: fadeInUp 2s infinite;
  }
  
  .mouse {
    width: 26px;
    height: 40px;
    border: 2px solid rgba(255, 255, 255, 0.5);
    border-radius: 20px;
    margin: 0 auto 10px;
    position: relative;
  }
  
  .wheel {
    width: 4px;
    height: 8px;
    background: rgba(255, 255, 255, 0.8);
    border-radius: 2px;
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    animation: scroll 2s infinite;
  }
  
  @keyframes scroll {
    0% { opacity: 1; transform: translateX(-50%) translateY(0); }
    100% { opacity: 0; transform: translateX(-50%) translateY(12px); }
  }
  
  @keyframes fadeInUp {
    0%, 100% { opacity: 0.6; transform: translateX(-50%) translateY(0); }
    50% { opacity: 1; transform: translateX(-50%) translateY(-10px); }
  }
  
  /* Responsive */
  @media (max-width: 768px) {
    .parallax-title {
      font-size: 2rem;
    }
    
    .parallax-description {
      font-size: 1rem;
    }
    
    .product-showcase {
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .showcase-item {
      width: 120px;
      height: 120px;
    }
    
    .content-inner {
      padding: 20px;
      margin: 0 20px;
    }
  }
</style>

<script>
  // Load random product images for showcase
  async function loadParallaxProducts() {
    try {
      const response = await fetch('./product.json');
      const data = await response.json();
      const products = data.product || [];
      
      // Filter products with images and styles
      const validProducts = products.filter(p => p.image && p.styles && p.styles.length > 0);
      
      // Select 4 random products
      const selected = [];
      const used = new Set();
      
      while (selected.length < 4 && selected.length < validProducts.length) {
        const randomIndex = Math.floor(Math.random() * validProducts.length);
        if (!used.has(randomIndex)) {
          used.add(randomIndex);
          const product = validProducts[randomIndex];
          // Get random style/image for this product
          const randomStyle = product.styles[Math.floor(Math.random() * product.styles.length)];
          selected.push({
            title: product.title,
            image: randomStyle.image_path || product.image
          });
        }
      }
      
      // Render showcase items
      const showcase = document.getElementById('productShowcase');
      if (showcase && selected.length > 0) {
        showcase.innerHTML = selected.map(item => `
          <div class="showcase-item" title="${item.title}">
            <img src="${item.image}" alt="${item.title}" loading="lazy" />
          </div>
        `).join('');
      }
    } catch (error) {
      console.error('Error loading parallax products:', error);
    }
  }
  
  // Parallax scroll effect
  function initParallax() {
    const parallaxBg = document.querySelector('.parallax-bg');
    const parallaxElements = document.querySelector('.parallax-elements');
    const parallaxProducts = document.querySelector('.parallax-products');
    
    if (!parallaxBg) return;
    
    window.addEventListener('scroll', function() {
      const scrolled = window.pageYOffset;
      const section = document.querySelector('.parallax-section');
      
      if (!section) return;
      
      const sectionTop = section.offsetTop;
      const sectionHeight = section.offsetHeight;
      const viewportHeight = window.innerHeight;
      
      // Only animate when section is in view
      if (scrolled + viewportHeight > sectionTop && scrolled < sectionTop + sectionHeight) {
        const offset = (scrolled - sectionTop) * 0.5;
        
        if (parallaxBg) {
          parallaxBg.style.transform = `translateY(${offset * 0.3}px)`;
        }
        
        if (parallaxElements) {
          parallaxElements.style.transform = `translateY(${offset * 0.5}px)`;
        }
        
        if (parallaxProducts) {
          parallaxProducts.style.transform = `translateY(${offset * 0.2}px)`;
        }
      }
    });
  }
  
  // Initialize on page load
  document.addEventListener('DOMContentLoaded', function() {
    loadParallaxProducts();
    initParallax();
  });
</script>
